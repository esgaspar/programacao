# Datasource
spring.datasource.url=jdbc:mysql://localhost:3306/db?useTimezone=true&serverTimezone=America/Sao_Paulo
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driverClassName=com.mysql.cj.jdbc.Driver
spring.datasource.hikari.connection-test-query=SELECT 1

# JPA
spring.jpa.show-sql=false
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# JWT
api.security.token.secret=${JWT_SECRET}

# CORS
cors.allowed-origins[0]=http://localhost:4200
cors.allowed-origins[1]=http://89.117.32.90
cors.allowed-origins[2]=https://89.117.32.90
cors.allowed-origins[3]=https://esgaspar.cloudns.ph

# Server
server.servlet.context-path=/api
