# database configs
spring.datasource.url=jdbc:mysql://localhost:3306/db?useTimezone=true&serverTimezone=America/Sao_Paulo
spring.datasource.username=${DB_USER:esgaspar}
spring.datasource.password=${DB_PASSWORD:esgaspar}
spring.datasource.driverClassName=com.mysql.cj.jdbc.Driver
spring.datasource.testWhileIdle=true
spring.datasource.validationQuery=SELECT 1
spring.datasource.testOnBorrow=true
spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=update
spring.jpa.hibernate.naming-strategy=org.hibernate.cfg.ImprovedNamingStrategy
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
app.jwt-secret=${JWT_SECRET:dev-only-secret-not-for-production-xK9mP2qR}
app-jwt-expiration-milliseconds=604800000
api.security.token.secret=${JWT_SECRET:dev-only-secret-not-for-production-xK9mP2qR}
cors.allowed-origins=http://localhost:4200, http://89.117.32.90
server.servlet.context-path=/api
spring.main.allow-circular-references=true
