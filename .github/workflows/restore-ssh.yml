name: Restore SSH Access

on:
  workflow_dispatch:

jobs:
  restore:
    runs-on: ubuntu-latest
    steps:
      - name: Add new SSH key to server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 89.117.32.90
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            mkdir -p ~/.ssh
            echo "ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAILlqln1/spg4U0TcJyQApuCpqDbye8dvkook8R3OzqDx hostinger-1778901011" >> ~/.ssh/authorized_keys
            chmod 600 ~/.ssh/authorized_keys
            echo "SSH key added"
