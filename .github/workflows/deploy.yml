name: Deploy Backend

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy no Hostinger
        uses: appleboy/ssh-action@v1.0.3
        env:
          LOCAL_SSH_PUBLIC_KEY: ${{ secrets.LOCAL_SSH_PUBLIC_KEY }}
        with:
          host: 89.117.32.90
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          envs: LOCAL_SSH_PUBLIC_KEY
          script: |
            set -e
            export JAVA_HOME=/usr/lib/jvm/temurin-25-jdk-amd64
            export PATH=$JAVA_HOME/bin:$PATH
            export MAVEN_OPTS="--enable-native-access=ALL-UNNAMED"
            cd /home/workspace/programacao/programacao
            git pull origin main
            /opt/maven/bin/mvn clean package -DskipTests -q
            systemctl restart programacao-backend
            if [ -n "$LOCAL_SSH_PUBLIC_KEY" ] && ! grep -qF "$LOCAL_SSH_PUBLIC_KEY" ~/.ssh/authorized_keys 2>/dev/null; then
              echo "$LOCAL_SSH_PUBLIC_KEY" >> ~/.ssh/authorized_keys
              chmod 600 ~/.ssh/authorized_keys
            fi
            echo "Backend deployado com sucesso"
