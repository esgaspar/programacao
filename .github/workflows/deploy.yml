name: Deploy Backend

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy no Hostinger
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 89.117.32.90
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            cd /home/workspace/programacao/programacao
            git pull origin main
            /opt/maven/bin/mvn clean package -DskipTests -q
            systemctl restart programacao-backend
            echo "Backend deployado com sucesso"
