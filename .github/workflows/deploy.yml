name: Deploy Backend

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy no Hostinger
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 89.117.32.90
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            cd /home/workspace/programacao/programacao
            git pull origin main
            /opt/maven/bin/mvn clean package -DskipTests -q
            pkill -f 'programacao-0.0.1-SNAPSHOT.jar' || true
            sleep 2
            setsid nohup java -jar target/programacao-0.0.1-SNAPSHOT.jar > nohup.out 2>&1 < /dev/null &
            disown
            sleep 5
            pgrep -f 'programacao-0.0.1-SNAPSHOT.jar' && echo "Backend deployado com sucesso" || echo "ERRO: processo nao iniciou"
